<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 480px;
      height: 380px;
      background: #0f0f0f;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 10px 14px;
      background: #1a1a1a;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header h3 { color: #4caf50; font-size: 13px; letter-spacing: 0.5px; }
    #header-right { display: flex; align-items: center; gap: 8px; }
    #status-pill {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #222;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #status-pill.downloading { background: #1a3a1a; color: #4caf50; }
    #status-pill.done        { background: #1a3a1a; color: #4caf50; }
    #status-pill.error       { background: #3a1a1a; color: #ff4444; }
    #status-pill.cancelled   { background: #2a2a2a; color: #888; }
    #status-pill.exists      { background: #2a2010; color: #ff9800; }
    #settings-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 7px;
      font-family: inherit;
    }
    #settings-btn:hover { border-color: #555; color: #aaa; }

    #stats {
      padding: 8px 14px;
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      gap: 20px;
      flex-shrink: 0;
      font-size: 11px;
    }
    .stat-label { color: #555; margin-right: 4px; }
    .stat-value { color: #ccc; }
    #stat-pct { color: #4caf50; font-weight: bold; }

    #progress-wrap {
      height: 3px;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.4s ease;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      line-height: 1.65;
    }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: #111; }
    #log::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .line { white-space: pre-wrap; word-break: break-all; margin-bottom: 1px; }
    .line.progress { color: #4caf50; }
    .line.stderr   { color: #ff6b6b; }
    .line.info     { color: #666; }
    .line.merge    { color: #569cd6; }

    #footer {
      padding: 8px 14px;
      background: #1a1a1a;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #footer-msg { font-size: 10px; color: #444; }
    #cancel-btn {
      padding: 5px 14px;
      background: #2a0a0a;
      color: #ff4444;
      border: 1px solid #ff444444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    #cancel-btn:hover { background: #3a1010; border-color: #ff4444; }
    #cancel-btn:disabled { opacity: 0.3; cursor: default; }
    #cancel-btn.hidden { display: none; }

    /* Settings panel */
    #settings-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 16px 14px;
      gap: 10px;
      background: #0f0f0f;
    }
    #settings-panel.visible { display: flex; }
    .setting-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #dir-input {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #ccc;
      font-family: inherit;
      font-size: 12px;
    }
    #dir-input:focus { outline: none; border-color: #4caf50; }
    #dir-status {
      font-size: 11px;
      min-height: 16px;
    }
    #dir-status.ok  { color: #4caf50; }
    #dir-status.err { color: #ff4444; }
    #save-dir-btn {
      align-self: flex-start;
      padding: 6px 16px;
      background: #1a3a1a;
      color: #4caf50;
      border: 1px solid #4caf5044;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    #save-dir-btn:hover { background: #1f4a1f; }
  </style>
</head>
<body>
  <div id="header">
    <h3>⬇ yt-dlp monitor</h3>
    <div id="header-right">
      <span id="status-pill">starting</span>
      <button id="settings-btn">⚙</button>
    </div>
  </div>

  <!-- Main view -->
  <div id="main-view" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
    <div id="stats">
      <span><span class="stat-label">Progress</span><span class="stat-value" id="stat-pct">—</span></span>
      <span><span class="stat-label">Speed</span><span class="stat-value" id="stat-speed">—</span></span>
      <span><span class="stat-label">ETA</span><span class="stat-value" id="stat-eta">—</span></span>
      <span><span class="stat-label">File</span><span class="stat-value" id="stat-file">—</span></span>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="log"></div>
    <div id="footer">
      <span id="footer-msg">live output</span>
      <button id="cancel-btn">⏹ Stop Download</button>
    </div>
  </div>

  <!-- Settings view -->
  <div id="settings-panel">
    <div>
      <div class="setting-label">Save directory</div>
      <input id="dir-input" type="text" placeholder="e.g. C:\Users\you\Downloads" />
    </div>
    <div id="dir-status"></div>
    <button id="save-dir-btn">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
