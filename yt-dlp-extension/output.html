<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      padding: 8px 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header h3 { color: #ff4444; font-size: 13px; }
    #status-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #222;
      color: #aaa;
    }
    #status-pill.downloading { background: #1a3a1a; color: #4caf50; }
    #status-pill.done        { background: #1a3a1a; color: #4caf50; }
    #status-pill.error       { background: #3a1a1a; color: #ff4444; }
    #status-pill.cancelled   { background: #2a2a2a; color: #888; }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      line-height: 1.6;
    }
    #log::-webkit-scrollbar { width: 5px; }
    #log::-webkit-scrollbar-track { background: #111; }
    #log::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .line { white-space: pre-wrap; word-break: break-all; }
    .line.progress { color: #4caf50; }
    .line.stderr   { color: #ff6b6b; }
    .line.info     { color: #888; }
    #footer {
      padding: 6px 12px;
      background: #1a1a1a;
      border-top: 1px solid #222;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="header">
    <h3>⬇ yt-dlp output</h3>
    <span id="status-pill">starting...</span>
  </div>
  <div id="log"></div>
  <div id="footer">Auto-scrolling • closes when done</div>
  <script src="output.js"></script>
</body>
</html>
